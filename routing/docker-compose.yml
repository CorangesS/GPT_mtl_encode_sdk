version: '3.6'
services:
  nmos-registry:
    image: rhastie/nmos-cpp:latest
    container_name: nmos-registry
    hostname: nmos-registry
    volumes:
      - "./registry.json:/home/registry.json"
    environment:
      - RUN_NODE=FALSE
    networks:
      external:
        ipv4_address: '192.168.1.200'

  nmos-virtnode:
    image: rhastie/nmos-cpp:latest
    container_name: nmos-virtnode
    hostname: nmos-virtnode
    volumes:
      - "./node.json:/home/node.json"
    environment:
      - RUN_NODE=TRUE
    networks:
      external:
        ipv4_address: '192.168.1.201'
    depends_on:
      - nmos-registry

  nmos-testing:
    image: amwa/nmos-testing:latest
    container_name: nmos-testing
    # hostname: nmos-testing     # 可留可不留
    # entrypoint: python3 nmos-test.py   ← 建議簡化成這樣
    entrypoint: |
      /bin/bash -c "/etc/init.d/dbus start; /etc/init.d/avahi-daemon start; python3 nmos-test.py"
    volumes:
      - "./UserConfig.py:/config/UserConfig.py"
    networks:
      external:
        ipv4_address: '192.168.1.203'
    depends_on:
      - nmos-virtnode

networks:
  external:
    driver: macvlan
    driver_opts:
      parent: eno1                # 確認是正確的網卡名稱（ip link show）
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1    # ← 務必加上你路由器的 IP
